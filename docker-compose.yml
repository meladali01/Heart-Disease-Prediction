version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    # By default the image ships with a baked sample model at /app/models/knn_final.joblib
    # If you want to override or iterate on models locally, uncomment the models volume below.
    # volumes:
    #   - ./models:/app/models
    volumes:
      - ./data:/app/data
    environment:
      - MODEL_PATH=/app/models/knn_final.joblib
      - APP_HOST=0.0.0.0
      - APP_PORT=5000
